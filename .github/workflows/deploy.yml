name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build the Docker Image using Buildx (supports multiple architectures)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ezdussin/whatsapp-automation-backend:latest
          # This ensures it works on your Contabo VPS (AMD64)
          platforms: linux/amd64

      # 2. Set up Kubectl and Context
      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Prepare Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # 3. Deploy to k3s
      - name: Deploy to k3s
        uses: azure/k8s-deploy@v4
        env:
          KUBECONFIG: /home/runner/.kube/config
        with:
          action: deploy
          strategy: basic
          namespace: whatsapp-system
          manifests: |
            k8s/deployment.yaml
            k8s/network.yaml
          images: 'ezdussin/whatsapp-automation-backend:latest'